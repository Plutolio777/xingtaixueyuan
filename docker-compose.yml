version: "3.8"

services:
  xingtai-h5:
    build: .
    image: xingtai-h5:latest
    container_name: xingtai-h5
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
